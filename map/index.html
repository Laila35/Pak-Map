<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #050505; }
    #map { position: absolute; inset: 0; width: 100%; height: 100%; }
    .leaflet-container { background: #050505; font-family: "Segoe UI", system-ui, sans-serif; }
    /* White card popup (click) — className applies to .leaflet-popup */
    .leaflet-popup.map-popup-card .leaflet-popup-content-wrapper {
      background: #ffffff !important;
      border-radius: 10px !important;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35) !important;
      padding: 0 !important;
    }
    .leaflet-popup.map-popup-card .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup.map-popup-card .leaflet-popup-tip {
      background: #ffffff !important;
      box-shadow: none !important;
    }
    .map-card-inner { padding: 14px 16px 16px 16px; position: relative; min-width: 220px; max-width: 300px; }
    .map-card-tier { position: absolute; top: 12px; right: 14px; font-size: 9px; letter-spacing: 0.14em; color: #888888; font-weight: 600; }
    .map-card-title { font-size: 17px; font-weight: 700; color: #111111; margin: 0 72px 8px 0; line-height: 1.2; }
    .map-card-coords { font-size: 12px; color: #666666; margin-bottom: 10px; line-height: 1.35; }
    .map-card-value { font-size: 24px; font-weight: 700; color: #b8860b; letter-spacing: -0.02em; }
    /* Hover tooltip: follows cursor (sticky) — same visual language */
    .leaflet-tooltip.map-tooltip-card {
      background: #ffffff !important;
      color: #111111 !important;
      border: 1px solid rgba(0, 0, 0, 0.08) !important;
      border-radius: 8px !important;
      box-shadow: 0 6px 28px rgba(0, 0, 0, 0.28) !important;
      padding: 10px 12px !important;
      font-size: 13px !important;
      line-height: 1.45 !important;
      max-width: 280px;
    }
    .leaflet-tooltip.map-tooltip-card::before {
      border-top-color: #ffffff !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
    (function () {
      'use strict';

      var map = L.map('map', { zoomControl: false }).setView([20, 0], 2);

      L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        {
          attribution: '&copy; Esri, Maxar, Earthstar Geographics, GIS User Community',
          maxZoom: 19
        }
      ).addTo(map);

      var markerLayer = L.layerGroup().addTo(map);
      /** @type {Object.<string, L.CircleMarker>} */
      var markers = {};

      function radiusForValue(v, vmin, vmax) {
        v = Number(v);
        if (!isFinite(v)) return 12;
        if (vmax <= vmin) return 14;
        var t = (v - vmin) / (vmax - vmin);
        return 6 + t * 22;
      }

      function displayTitle(p) {
        var c = String(p.city || '').trim();
        if (c) return c;
        var id = String(p.id || '');
        return id.length >= 4 ? 'Target ' + id.substring(0, 8) : 'Target ' + id;
      }

      function tierFor(v, vmin, vmax) {
        v = Number(v);
        if (!isFinite(v) || vmax <= vmin) return 'TIER II';
        var t = (v - vmin) / (vmax - vmin);
        if (t >= 0.66) return 'TIER I';
        if (t >= 0.33) return 'TIER II';
        return 'TIER III';
      }

      function formatVal(p) {
        if (p.value == null || p.value === '') return '—';
        return Number(p.value).toLocaleString();
      }

      function popupHtml(p, vmin, vmax) {
        var lat = Number(p.lat).toFixed(4);
        var lng = Number(p.lng).toFixed(4);
        var val = formatVal(p);
        var tier = tierFor(Number(p.value), vmin, vmax);
        var title = displayTitle(p);
        return (
          '<div class="map-card-inner">' +
            '<div class="map-card-tier">' + tier + '</div>' +
            '<div class="map-card-title">' + title + '</div>' +
            '<div class="map-card-coords">Lat: ' + lat + ' &nbsp;·&nbsp; Lng: ' + lng + '</div>' +
            '<div class="map-card-value">' + val + '</div>' +
          '</div>'
        );
      }

      function tooltipHtml(p, vmin, vmax) {
        var lat = Number(p.lat).toFixed(4);
        var lng = Number(p.lng).toFixed(4);
        var val = formatVal(p);
        var title = displayTitle(p);
        return (
          '<div class="map-tooltip-inner">' +
            '<div style="font-weight:700;font-size:14px;color:#111;margin-bottom:6px">' + title + '</div>' +
            '<div style="font-size:12px;color:#666;margin-bottom:4px">Lat: ' + lat + ' &nbsp; Lng: ' + lng + '</div>' +
            '<div style="font-size:13px;color:#666">Value: <strong style="color:#b8860b">' + val + '</strong></div>' +
          '</div>'
        );
      }

      /**
       * @param {Array} data - [{ id, city, lat, lng, value }, ...]
       * @param {string|null|undefined} selectedId - optional, reopen popup without pan
       */
      window.addMarkers = function (data, selectedId) {
        markerLayer.clearLayers();
        markers = {};
        if (!data || !data.length) {
          return;
        }

        var vals = data.map(function (p) { return Number(p.value); }).filter(isFinite);
        var vmin = vals.length ? Math.min.apply(null, vals) : 0;
        var vmax = vals.length ? Math.max.apply(null, vals) : 1;

        var sel = selectedId != null && String(selectedId) !== '' ? String(selectedId) : null;
        var bounds = L.latLngBounds([]);

        data.forEach(function (p) {
          var pid = String(p.id);
          var lat = Number(p.lat);
          var lng = Number(p.lng);
          if (!isFinite(lat) || !isFinite(lng)) return;

          var r = radiusForValue(p.value, vmin, vmax);
          var isSel = sel && pid === sel;
          var cm = L.circleMarker([lat, lng], {
            radius: r,
            color: isSel ? '#ffffff' : '#D4AF37',
            weight: isSel ? 3 : 2,
            fillColor: '#D4AF37',
            fillOpacity: isSel ? 0.5 : 0.28
          }).addTo(markerLayer);

          bounds.extend([lat, lng]);
          cm.bindPopup(popupHtml(p, vmin, vmax), {
            className: 'map-popup-card',
            maxWidth: 340,
            autoPan: true,
            autoPanPadding: [28, 28]
          });
          cm.bindTooltip(tooltipHtml(p, vmin, vmax), {
            sticky: true,
            direction: 'top',
            opacity: 1,
            className: 'map-tooltip-card',
            offset: [0, -10]
          });
          cm.on('click', function () {
            if (window.bridge && typeof window.bridge.markerClicked === 'function') {
              window.bridge.markerClicked(pid);
            }
          });
          markers[pid] = cm;
        });

        if (bounds.isValid()) {
          map.fitBounds(bounds, {
            padding: [52, 52],
            maxZoom: 14,
            animate: true
          });
        }
      };

      /** Highlight selected marker (stroke/fill); optionally pan. Called from Python (table → map). */
      window.highlightMarkerOnMap = function (id, options) {
        options = options || {};
        var fly = options.fly !== false;
        var sel = id != null && id !== '' ? String(id) : null;
        function defaultStyle() {
          return { color: '#D4AF37', weight: 2, fillColor: '#D4AF37', fillOpacity: 0.28 };
        }
        function selectedStyle() {
          return { color: '#ffffff', weight: 3, fillColor: '#D4AF37', fillOpacity: 0.5 };
        }
        Object.keys(markers).forEach(function (k) {
          var m = markers[k];
          var isSel = sel && k === sel;
          m.setStyle(isSel ? selectedStyle() : defaultStyle());
        });
        if (!sel) {
          map.closePopup();
          return;
        }
        if (markers[sel] && fly) {
          window.focusMarker(sel, { fly: true });
        } else if (markers[sel]) {
          markers[sel].bringToFront();
        }
      };

      window.focusMarker = function (id, opts) {
        opts = opts || {};
        var fly = opts.fly !== false;
        var key = String(id);
        var m = markers[key];
        if (!m) return;
        if (fly) {
          map.flyTo(m.getLatLng(), Math.max(map.getZoom(), 8), { duration: 0.85 });
          map.once('moveend', function () {
            m.openPopup();
          });
        } else {
          m.openPopup();
        }
      };

      new QWebChannel(qt.webChannelTransport, function (channel) {
        window.bridge = channel.objects.bridge;
      });
    })();
  </script>
</body>
</html>
