<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>datamap-explorer</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(1200px 500px at 20% 0%, rgba(255,215,0,0.10), transparent),
                    radial-gradient(1200px 500px at 80% 100%, rgba(135,206,235,0.10), transparent),
                    #0b0b0c;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: rgba(255,255,255,0.92);
      }
      .card {
        width: min(720px, calc(100vw - 32px));
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 16px;
        padding: 18px 18px;
        box-shadow: 0 18px 70px rgba(0,0,0,0.55);
      }
      .title {
        font-size: 22px;
        font-weight: 800;
        margin: 0 0 8px 0;
        letter-spacing: 0.02em;
      }
      .title .gold { color: #FFD700; }
      .title .white { color: #ffffff; }
      .muted { color: rgba(255,255,255,0.70); margin: 0 0 14px 0; line-height: 1.45; }
      a {
        color: #87CEEB;
        text-decoration: none;
        font-weight: 700;
      }
      a:hover { text-decoration: underline; }
      .hint {
        margin-top: 12px;
        font-size: 12px;
        color: rgba(255,255,255,0.55);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="title"><span class="gold">DEEP</span><span class="white">DIVE</span> — datamap-explorer</p>
      <p class="muted">
        This repository is primarily a <strong>Python/PyQt desktop app</strong>. If you are viewing this on the web (Vercel),
        this page exists mainly to prevent missing static assets like <code>/favicon.ico</code>.
      </p>
      <p class="muted">
        Map page (static): <a href="/desktop/map/index.html">Open map</a>
      </p>
      <div class="hint">Tip: the full experience is via <code>python desktop/main.py</code>.</div>
    </div>
  </body>
</html>
