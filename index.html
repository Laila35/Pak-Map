<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DEEPDIVE — datamap-explorer</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background: #0b0b0c;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: rgba(255,255,255,0.92);
      }
      .app {
        height: 100%;
        width: 100%;
        display: grid;
        grid-template-columns: 320px 1fr 420px;
        gap: 10px;
        padding: 12px 10px;
        box-sizing: border-box;
        background:
          radial-gradient(1200px 500px at 20% 0%, rgba(255,215,0,0.10), transparent),
          radial-gradient(1200px 500px at 80% 100%, rgba(135,206,235,0.10), transparent),
          #0b0b0c;
      }
      .panel {
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        box-shadow: 0 18px 70px rgba(0,0,0,0.55);
        overflow: hidden;
        min-height: 0;
      }
      .panel .hdr {
        padding: 18px 18px 14px 18px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .brand {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 0.02em;
      }
      .brand .w { color: #f5f2ed; }
      .brand .g { color: #D4AF37; font-style: italic; }
      .micro {
        margin-top: 10px;
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.55);
      }
      .body {
        padding: 16px 18px;
        display: grid;
        gap: 16px;
      }
      .label {
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.55);
      }
      .input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(0,0,0,0.40);
        color: rgba(255,255,255,0.92);
        outline: none;
      }
      .input::placeholder { color: rgba(255,255,255,0.45); }
      .btn {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(0,0,0,0.40);
        color: rgba(255,255,255,0.92);
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 10px;
      }
      .btn:hover { border-color: rgba(212,175,55,0.65); color: #D4AF37; }
      .map {
        padding: 0;
        display: grid;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 16px;
        background: #e8eef2;
      }
      .dirTitle {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 26px;
        font-weight: 300;
        color: #ffffff;
      }
      .dirTitle:hover { color: #87CEEB; }
      .muted {
        font-size: 12px;
        color: rgba(255,255,255,0.60);
        line-height: 1.45;
      }

      /* responsive: mimic desktop behavior */
      @media (max-width: 1240px) {
        .app { grid-template-columns: 320px 1fr; }
        .panel.right { display: none; }
      }
      @media (max-width: 980px) {
        .app { grid-template-columns: 1fr; }
        .panel.left, .panel.right { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="panel left">
        <div class="hdr">
          <div class="brand"><span class="w">DEEP</span><span class="g">DIVE</span></div>
          <div class="micro">Global Intelligence Mapping</div>
        </div>
        <div class="body">
          <div>
            <div class="label">Data ingestion</div>
            <button class="btn" type="button">Select CSV / JSON</button>
          </div>
          <div>
            <div class="label">Manual entry</div>
            <div class="label" style="margin-top:10px">City</div>
            <input class="input" placeholder="Enter city name" />
          </div>
          <div>
            <div class="label">Search index</div>
            <input class="input" placeholder="Type your city name" />
            <div class="muted" style="margin-top:8px">
              Note: Web view is a visual mirror. Full interactive controls are available in the desktop app.
            </div>
          </div>
        </div>
      </div>

      <div class="panel map">
        <iframe src="/desktop/map/index.html" title="Map"></iframe>
      </div>

      <div class="panel right">
        <div class="hdr">
          <div class="dirTitle">Directory</div>
          <div style="margin-top:10px">
            <input class="input" placeholder="Filter directory by city…" />
          </div>
          <div class="micro" style="margin-top:10px">0 Records Found</div>
        </div>
        <div class="body">
          <div class="muted">Directory list is available in the desktop app UI.</div>
        </div>
      </div>
    </div>
  </body>
</html>
